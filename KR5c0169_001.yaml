front:
  text: 太上混元老子史略卷上敬二
  hash: sha256:d43fc12b61cf41b6389563b25dc17b8c7d0d48a346ee4acd07971d106c894154
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0169_HFL_001-001a, image: hfl/0554/0554-040.png}
body:
  text: 廬山清虛菴道士臣謝守灝編龍漢延康以來盤古太極之際老君降世不一洪荒之世載籍叵詳今存而勿論姑氏於天皇氏焉天皇氏子孫相承治天下一萬八百歲地皇氏子孫相承治天下一萬八百年人皇氏子孫相承治天下一萬八百年五龍紀五姓治天下七萬三千年攝提紀七十二姓治天下共六十九萬一千五百年合熊紀七十二姓治天下共三千二十年連遙紀六姓治天下共六千四百三十五年肆姓紀四姓治天下共一萬四千年老君時下降號玄中法師又號有古大先生亦號盤古先生並皆隨世行教伏羲木德初造曆元年起甲寅子孫相承四萬五千六百年老君時降號鬱華子祝融火德起丙辰子孫相承共五百三十年老君降世號廣壽子神農祝融之裔始教民耕種百穀故號神農老君號大成子黃帝土德起乙酉子孫相承共一千五百二十年老君降世號廣成子居于空同山帝捐天下膝行問道乘龍上升授陰符經少皥金德子孫相承共四百年老君降世號隨應子授莊敬經顓頊水德在位七十八年老君號赤精子高辛木德在位七十年老君號録圖子授黃庭經唐堯火德在位七十年老君號務成子授道德經虞舜土德攝位三十年在位五十年老君號尹壽子夏禹金德建寅為正月子孫相承共四百六十三年老君號真行子授靈寶五符治水真文商湯水德元年庚戌建丑為正月老君號錫則子授長生經以上出帝系譜歷代記運圖洞神大有經玉曆經出塞記尹氏玄中記崔山地理志老君既分身下降隨世立教事竟則隱故未有誕生之迹陽甲自湯至此凡一十八世在位三十年元年甲辰十七年庚申老君自太清境分神化氣託孕於玄妙玉女出聖紀及仙傳盤庚二十九年小辛十八年小乙十一年武丁號高宗在位五十九年元年壬申九年庚辰二月建寅商用地正青羊宫記云商高宗御極之世周文王演易之初神光流入於瓊胎瑞彩結成於金骨唐翰林學士承旨樂朋龜奉敕撰刻石在成都府論語孔子曰竊比於我老彭古注云老彭商之賢大夫也疏云老是老聃彭是彭祖世本云在商為守藏史在周為柱下史蓋文王尚未侯服事商未得稱周也祖甲在位十年祖庚在位六年亶甲在位三年庚丁在位一年武乙在位二年太丁在位二年帝乙在位八年商紂在位二十七年六年乙未二十一年丁卯老君再降于岐山之陽號燮邑子今鳳翔府啓聖宫即其處時周文王為西伯召為守藏史紂無道武王滅之商有天下共六百二十九年周武王木德建子為正月十五日癸酉誅紂滅商即天子住遷老君為柱下史隋內史薛道衡奉勑撰祠庭頌其序云爰自伏羲至于周氏綿記歷代見質變名在文王武王之時居藏史柱之職市朝屢易容貌不改成王在位四十七年元年戊寅老君為柱下史康王在位二十六年元年乙丑老君仍為柱下史昭王在位四十九年元年乙卯老君棄官歸亳二十三年癸丑西過函谷關度關令尹喜神仙傳云老君之馭者徐甲約日顧百錢至時當計七百三十萬甲見老君將遠適亟來索傭老君曰吾欲令汝衛車往西海大秦罽賔安息諸國還當以金償汝甲乃止及至關甲欲留遂訟老子索錢老君謂曰汝隨我已二百餘年汝久應死吾以太玄生符與汝乃得至今日汝何不念此而訟吾言訖符自甲口飛出甲立死尹喜為請復投以符甲即生自商高宗九年至周昭王二十三年九二百一十歲二十四年甲寅老君授道尹喜已即升天二十五年乙卯復分身降於蜀李太官家二十七年丁已會尹喜於靑羊之肆故唐記云靑羊肆者太上混元天皇大帝第二降生之所也自商道否閉周德陵夷歷藏史以同塵棄柱史而隱迹東離魏闕西度函關尹喜占知道君之必至潛傳妙訣暗付微言重為千日之期再結一時之會將離蜀上欲化胡風遠適流沙長移獷俗及身毒罽賔之國教煩陀阿柱之王八十種之獯戎皆歸清化二千國之獷悍永革昏風魏明帝製老君贊云深憫後世託下於陳為周柱史經九百年無極之際言歸崑崙化彼胡域次授罽賔復及天竺於是遂遷文垂後世永平弗泯又北史西域傳云于闐國在蔥嶺之北二百餘里北去代郡九千八百里其地方圓千里連山次城都方九百里內有大城五小城數十倍重佛法寺塔僧尼其西南五百里有毗摩寺云是老子化胡之所俗無禮義多盜賊淫縱自外風俗與龜兹同事兼見於魏略西戎傳及漢疏穆王在位五十五年元年辛巳老君化胡已即復還中國東遊扶桑會大帝校集羣仙王聞尹真人得道上升乃為修樓觀立道士七人以奉祠事見穆王內傳及樓觀記云共王在位十二年元年丙子孝王在位十五年元年癸丑懿王在位二十五年元年戊子夷王在位十六年元年戊辰厲王在位三十七年元年甲申周召共和在位一十四年宣王在位四十六年元年甲戌時有採薪行歌者人莫能識以問老君曰此活國人修習無上正真之道者也幽王在位十一年元年庚申二年辛酉地動涇渭洛皆震老君曰周將亡矣果為犬戎所滅事出史記平王東遷洛邑在位五十二年辛未三十三年癸卯十二月老君復出散關開化蘇國遂至西海流麟等洲考較羣仙功行補授官事訖復還中國出西升記二十五年乙巳老君降于道士朱倫之室宣以靈飛六甲素奏丹符中景通真之經威王在位二十三年元年壬戌莊王在位十五年元年乙酉三年丁亥四月魯威公薨于齊莊公乃即位次年春秋方改元魯莊公之七年即周莊王十年也十年甲午四月建卯初七日夜釋迦佛生瑞應經云四月八日夜半生此用周正也又過去見在經云二月八日生還用夏正也北史西域傳焉齊國與婆羅門俗信佛法尤重二月八日生齋戒行道左傳曰夜常星不見夜明也中星隕如雨於兩階也故蕭齊録事參軍王中撰頭陀寺碑云周魯二莊親昭夜景之鑒漢晉兩明並勒丹靑之飾此碑在鄂州文選注云佛生於周莊王時佛法自漢明帝時來晉明帝時興僖王在位五年惠王在位二十五年元年乙巳襄王在位三十三年元年庚戌頃王在位六年元年癸卯匡王在位六年元年己酉四年千子佛入涅槃年七十九釋氏金光明經云壽命短促方八十年蓋舉成數也定王在位二十一年元年乙卯王問老子以在世神仙老子對以中嶽有大古先生即子是也出望祠官張僧鑑潯陽記簡王在位一十四年元年丙子靈王在位二十七年元年庚寅二十一年庚戌十月二十一日孔子生景王在位二十五年元年丁巳悼王在位五月敬王在位四十三年元年壬午十七年戊戌孔子見老子問道見禮記及莊子或恐在前雖見禮記孔子家語及史記皆不繫年月故莫知其先後也四十一年千戌孔子卒年七十三歲元王在位八年元年乙丑正定王在位二十八年元年癸丑哀王立三月思王立五月考王在位十五年元年辛丑威烈王在位二十四年元年丙辰安王在位二十六年元年庚辰十八年丁酉秦獻公立夷烈王在位七年元年丙午二年丁未老君遇秦獻公授館致禮問以曆數老子遂出散關出史記顯王在位四十八年元年癸丑八年庚申秦孝公立老君東遊還赤城蒙山重過扶桑集羣仙已而隱遊景太至少室注拾遺記愼靚王在位六年元年辛丑赧王遷都西周在位五十九年元年丁未九年乙卯秦昭王老子與諸仙西遊女几雞頭天柱復出散關遂渡流沙升崑崙還紫微上宫昭王聞知乃於老君所經由為置城邑以表聖迹故立老停驛尹喜城五十九年西周亡自商武丁九年庚辰老君降生至周赧王九年乙卯還歸天闕其間出入隱顯凡九百三十六年故魏明帝贊云為周柱史經九百年唐太學博士吳楊昊亦云老君變通靈應難測既生商日又仕周時計其始終乃歷千載此舉其成也秦始皇帝元年乙卯二十六年庚辰分三十六郡二十八年壬午封禪建老子祠於樓觀之南躬行饗祠老子降乃授帝鬼林經策使鬼神之符前漢文帝元年壬戌七年戊辰老子降於陜河之濱人號為河上公帝親訪之老子授道德經至今陜府北有河上公廟并文帝望仙臺即其所也成帝河平元年癸巳二年甲午老君降于琅琊郡曲陽淵授干吉太平經一百七十卷後漢明帝佛法初入中國章帝元極元年甲申二年乙酉老子降再授干吉一百八十戒安帝永初元年丁未三年己酉老君下降賜江夏人劉圖罪福新科報應之事順帝永建元年丙寅後凡四改元漢安元年壬午老君降于蜀之鶴鳴山授天師張道陵正一盟威祕籙五月再降賜太清中經九百三十卷符文七十二卷建康元年再降于閬州雲臺山授以三洞衆經及超度九玄之法威帝建和元年丁亥後凡一改元永壽元年乙未老君降于成都授天師削死之文今玉局化是其地也又降于鹿堂山授以制六天較鬼之文靈帝建寧元年戊申後凡三改元光和二年己未老君降于天台山授仙人葛玄上清靈寶大洞等經三籙九品齋法勸戒法神入定等經晉安帝隆安元年丁酉後凡一改元元興元年壬寅姚秦洪始五年老君降按行山嶽勑仙人成公興令移居嵩山仍賜以仙藥以上並互見於史傳及洞天福地記諸郡圖經後魏明皇帝永興元年即位後五年凡改元三神瑞二年乙卯晉安帝義熙十一年也老君降于嵩山授道士寇謙之雲中音誦新科之戒泰常二年丁巳再降賜以符籙七十卷隋煬帝大業元年乙丑大業十三年丁丑老君降于終南山語李淳風以唐公受命之符出金鎖流珠唐高祖武德元年戊寅二年己卯老君降于羊角山語吉善行令奏聞云我帝祖也今得聖治社稷延長五年壬午再降告以破賊之期出唐史高宗永徽元年庚戌龍翔二年壬戌帝幸洛陽宫建清廟於北邙治祠設醮慶讚老君降于殿上二真人夾侍光耀階壇衆咸瞻仰宫闈令權大力等列狀奏聞詔依所圖寫為瑞像見洛州録事楊謢師奏狀乾封二年丙寅帝封岱嶽至毫謁老子御製册文上老子尊號曰玄元皇帝聖母為先天大聖后儀鳳四年勑建齋於洛陽清廟老子降于壇上祥光照映乘白馬而朱鬛履壇石皆有迹衆所瞻睹登時奏聞故賀表云金相玉毫彩奪夜明之影白騎丹鬛迹流天駟之庭見朝散大夫孫瑞奏狀則天武后文明元年甲申老君降于虢州皇天原命塢元宗令傳言武后不可革命出唐聖記玄宗明皇開元元年癸丑開元十七年老君降于蜀州新興寺乃入佛殿隱景柱中宛如刻畫洗削愈現本路文武官及道俗僧尼同狀聞奏表文云現於殿柱沓疑作史之年照彼佛寺緬若化胡之日見益州長史張敬忠奏狀開元二十九年老君降于丹鳳門外語田同秀曰我昔將入流沙藏一金匱靈符在尹喜舊宅可奏帝取之帝遣使求得之於函谷關故墟出唐史天寶八載上聖祖老君尊號曰太上玄元皇帝九載庚寅老君降于太白山語山人王玄翼曰寶仙洞有妙寶真符汝可奏帝取之上命刑部尚書張均等去取果得之出唐史十三載甲午帝朝獻太清宫又上老君尊號曰大聖祖高上大道金闕玄元天皇大帝出史記肅宗至德二載丁酉老君降于通化郡雲龍巖自地接天儀相炳然詔圖其本明皇御製贊曰晝現殊相空浮瑞色道釋人天作禮瞻奉申命藻繪示諸郡國見唐明皇瑞像贊序懿宗咸通十年己丑龐勛領三千餘人欲奪太清宫時士庶千餘家在宫避難咸見老君乘空而騰須臾黑霧昏曀賊黨迷路自相蹂踐龐勛亦溺水死見汴州節度使李尉奏表宋真宗大中祥符七年甲寅駕幸毫州謁太清宫親奉册寶上尊號曰太上老君混元上德皇帝出宋朝事實徽宗政和二年壬辰老君乘白馬駕祥雲降玉晨觀授梁先生加句天童謢命妙經自有記其餘降見事迹記傳不繫時代者不述與夫放光見瑞示夢傳言靈驗等事非化身下降者亦不復載也太上混元老子史略卷上
