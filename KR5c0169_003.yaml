front:
  text: 太上混元老子史略卷下敬四
  hash: sha256:2435b3981558171f1e652b7c0d92decbf1bf169626e9bd97a0b5ab1b4f68a719
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0169_HFL_003-001a, image: hfl/0554/0554-116.png}
body:
  text: 廬山清虛菴道士臣謝守灝編初老君欲垂世立教故示有修證之訣師資傳授之格乃以上皇元年正月二日出遊西河歷觀八方時元始天尊乘八景玉輿九色玄龍三素飛雲導從羣仙各執華幡獅子白鶴嘯歌嗈嗈浮空而來同會西河之上老君稽首請曰昔蒙訓授天書玉字二十四圖雖得其文未見其像妙理難詳今遇慈尊願垂成就於是天尊口吐洞玄內觀玉符以授老君老君稽首奉承教旨具依天儀長齋服符三部八景神身中並見金書玉字二十四圖空中自明洞徹無窮羅絡自然即命主圖上仙依而畫之金書紫字丹簡玉章於此成立自南極上元九光大真王夫人東西二華南北真公五嶽神仙清虛真人所授真文並出於老子焉其圖分為上中下三品上品一神仙沐浴東井圖二五嶽真形圖三通靈訣精八史圖四六甲通靈圖王九宫紫房圖六元始太清圖七真道混成圖八西升寶籙圖中品一神仙微化圖二攝虛九靈圖三九變天圖四常存圖五守一養身圖六守神合景圖七寂默養真守志圖八芝英玉女圖下品一六陰玉女圖二九九道仙圖三導引圖四洞真洪保圖五變化隱惻圖六採芝開山圖七明鏡圖八無極太一圖並同玄元始之氣化生也老君嘗為玉晨大道君典領神仙虎符圖智惠素經凡上清大洞真經召靈滅魔神符寶章莫不掌録焉此經皆結飛玄自然之氣以成其道高妙衆經之尊總統萬真匡御羣仙祕於九天之上大有之宫鑄金為簡以撰靈文剋玉丹書以明其篇或藏太微靈都瓊宫玉房之內咸衛以巨獸扞以素龍神虎七千備于玉闕金晨玉童素靈玉女各三千人侍衛靈文衆真宴禮萬聖朝軒太上道君謂老君曰大劫之周擇授上真自無其人纍劫不傳後學求仙不知道源徒勞存思損瘦形神夫欲尋本當歸其根失根求生萬不得全上皇文字擇人而傳其法宜祕深不可言當依明科承而奉焉老君乃推校本元撰集靈篇以為寶經三百卷符圖七十章玉訣九千篇方諸青宫東海青童太君梵湄稽首再拜再三懇請老君憫之乃命封齋盟授使傳後學主召合真之人大君既授寶經位登上相金華玉女紫晨玉童各三千人俱侍衛焉秉靈符之節執命魔靈幡逍遙紫虛之館徘徊靑華之房滅六天於來運剪萬精於羣山接後學於金闕校仙籙於方諸延萬帝於曲宇讚寶訣於妙章撰獨立以齋真嚴四極以推運普統九天九地五嶽名山億兆萬真莫不咸隸生死圖籍細無不關末學之子欲授經及修行者皆宜先奉金闕於青宫投玉劄於上清典録玉司常陰察人精粗有勤苦乃得玄授焉老君又傳太虛真人南嶽赤君使授學道宿有金名玉字仙閣剋名當為真人者又傳天真皇人太真王等或封於西玄山王屋山中或刻於蓬萊府北室金柱玉璧上又以五色玉為簡各封五嶽石笥中須壬辰告會後聖君來下當出以付四轉使教上真之才凡欲求仙當尋其文得其本元道無不成苟不知道所出與寶訣所生謂之投暗而學無有祖宗不為降道亦不行也老君曰夫三洞寶經皆三清之上道也吾昔受之於元始天尊于今七億萬劫天地成敗萬品生滅唯吾獨尊今猶修之於景雲之上嘗以玉清玄簡出付真公於無量壽天又付方諸青童太君依九天品格萬劫一出自開皇以來傳付後學應為真者九千年聽傳三人或四十人九年中遇有其人聽頓傳之欲受吾經當依四極明科齋信詣師授以佩身間心修行愼勿輕傳又曰夫欲修行上法宜先修高上洞真三元齋值三元合真上應九玄凡欲請大洞真經三十九章雌一玉檢五帝寶經玄母八間十二上願佩神虎金虎符豁落七元流金鈴銷魔隱況威制萬靈飛步五星存注七元思真行道上求天仙合服神丹飛騰靈丸當修上元之法九日九夜清齋念神未至一日五香沐浴宿結齋心上至九人下至三人主客同到每事精勤欲修中元齋值六日六夜以贖己身積滯之愆解過於天真謝罪於三元宿愆既散高上降真書名玄閣剋成上仙學而無法徒勞損功無感於自然欲修下元之法三日三夜解拔七祖令死魄更生出離三塗上升南宫釋結解滯斷滅惡根七祖既度身自成仙其法高妙非真勿傳齋值畢然後修奉行上道常當沐浴清齋盛潔法服并嗽蕩口腹令內外清虛口無餘味腹無餘臐眼無餘穢體無餘塵淡泊靜默唯道是身然後修行焉夫學上道不奉三百大戒而請經行呪佩符思神合丹服藥隱處山林求升仙之舉恐未可希也若能戒全於內和光於外乃庶幾名標之崖矣非修道難奉道難耳子能全之餘及十方太上將保爾登仙矣戒全而請寶經佩大符而行事若復下仙則天下無有不死之道矣我每慨世求真人難得耳夫有經而無戒猶涉海以無舟楫猶有口而無舌何緣度兆身耶夫道要在明科積善內足然後始涉大道之境界弗能爾者皆為徒勞於風塵無益生命修短也老君復授青童道君靈書紫文修行二十四事其略曰採服飛根吞日氣之法有無服開明符常思見日初出時叩齒陽呪曰日魂之名日中五帝之字存見五色流霞來接一身呪咽如法當覺體生玉澤面有流光次採服陰華吞月之法先服太玄陰生符常思見月初出時叩齒陰呪曰月魄之名月中五夫人之字存見月中五色流精來接一身呪咽如法當覺體生三光目有飛精次拘三魂以三魂棄身遊遨飆逝本室或為他魂所見留制或為魁物所得收録當拘而留之使無遊逸其法常存心中赤氣轉大以覆身變而為火洞徹內外叩齒如法則三魂拘留矣次制七魄以七魄流落遊走穢濁或交通血食往來鬼魁或共死尸相鬥或言人之罪欲人之敗皆魄之疾也其法每晦朔弦望及庚申日存鼻端有白氣漸大以冠身九重又變作四靈之獸匝繞一身存呪如法則七魄制鍊矣又人身中有三元宫上元丹田泥丸宫其神赤子字元先一名帝卿中元丹田絳宫其神真人字子丹一名光堅下元丹田命門宫其神嬰兒字元陽一名玄谷此三一之神上宫服紫衣中宫赤衣下宫黃衣皆如嬰兒之狀欲拘魂魄當先呼其名并存服色次第分明又命門宫中有大君名桃康字合延衣朱衣冠芙蓉冠三魂侍側暮卧常存大君呪守如法一十八年大君能左激三田右御三氣呼陽六甲召陰六丁當來侍人也又行鬱儀結璘奔晨之道服靈飛六甲陰陽符佩神虎金虎消魔豁落流金之章請大洞真經三部八景二十四神服琅玕華丹挹黃水月華徊水玉精環剛之果即頭生七色之氣分形萬變千乘萬騎白日升天皆學道修仙要文乃太微天帝紫微上真天帝玉清君正傳之訣以紫玉為簡靑金為文龜母執筆真童拂筵天妃侍香玉童編名曰靈書紫文以付上相靑童大君使下授玄宫玉名為真人者於是靑童大君清齋千日稽伏膝行捧首北面依科明授以還方諸靑宫其後傳西城王君使下教骨相之子焉老君以商紂荒虐生靈塗炭哀憫斯民將下而拯救之乃以紂之二十一年丁卯歲正月上謁太上玉晨大道君曰商辛淫亂水運將窮西伯應昌可往佐之老君受事訖即以是月十有二日丙午分氣化身乘飛飆之轊風伯前驅彭祖驂乘降岐山之陽號燮邑子西伯周文王也召為守藏史作赤精經教以仁信之道至武王時號育成子遷為柱下史作璇璣經在成王時號經成子説廣化經乃隱在康王時號郭叔子復為柱下史潛龍卑秩以綏周道至昭王時老君慮周室將衰乃以八天隱文授王令保鎮國祚昭王自謂居自然之運稍怠於守成將縱心於巡幸不崇天文老君知王之不令終也乃收天文因而致仕歸居故里老君居周雖久常以自隱無名為務外和光同塵內實清虛不令名位之顯也後漢邊韶製碑銘云於惟玄德抱虛守清樂居下位勢祿弗營為繩為直能直是正屈則可縈守一不失為天下真處厚不薄居室舍榮稽式為重金玉是輕絶嗜去欲還歸於嬰浩然歷載莫知其情要以無為大化周成進退無常乃綜其貞以知為愚沖而不盈大人之度非人所聆九等之序何足纍名論曰考經史所載老君生時及仕周之年月或有不同者蓋由始皇滅先世典籍漢初編緝頽綱或問古老以為記或因缺史以為録存其略者缺其詳載其末者虧於本厥後史籍重興道經間出或得之者多隱而不傳致令晚學失其宗旨今按老君本記及樓觀記並云殷武丁庚辰歲二月十五日生以帝辛丁卯歲正月十二日爰自金闕降於岐山之陽為之五師又云西伯時為守藏史武成康時為柱下史其言信矣或云周時復寄神李母者蓋謂降生於蜀靑羊肆李大官之家時也若止生於周則安得於文王守藏史乎劉向列仙傳云生于商時然向謂初於柱下史後為守藏史失柱下史主四方上書計史於柱下當文王時尚以侯服事商安得有四方計史耶但有禮樂經籍即立守藏史耳而皇甫嵇康等遂亦遵向之言因以柱下為先唯隋薛道衡撰老君祠庭碑云當文王武王之時為藏史柱史之職斯言可當之矣無極元年太上道君復命老君開化西域即昭王之二十三年癸丑歲也老君五月晦日壬午駕青牛之車薄版為隆穹徐甲為御無極先生鬼谷先生北郭先生從焉將西度函關尹喜志慕道術喜字公文康王朝為大夫後召入為東宫賔友少好三墳八索之書善天文緯候乃結草為樓仰觀乾象精思志道號為樓觀今終南山盩厔縣神龍鄉間仙里中有草樓罽壇祠宇即其故室也周穆王再加修飾召幽逸之人為道士自爾相承至今不絶焉喜於是時見東方有紫氣西邁天文顯瑞知有聖人當度關而西乃求出為函谷關令關在陜州桃林縣十二里故墟存焉王從之按樓觀先師傳及樓觀記並云周康王聞喜有神仙度世之志乃拜為大夫至昭王時喜遇老君得道遂侍雲輿西邁其後穆王欽尚遺塵乃為建祠修觀故其碑文曰樓觀者周康王大夫關令尹喜所立也以其為樓故因以為號又曰周穆西巡秦政東獵並枉駕回轊親崇教道始皇建廟于樓南漢武立宫於觀北晉宋謁板于今尚存秦漢廟户相繼不絶貞觀二年改為宗聖觀由是觀之乃驗老君度關在昭王時也或云東周時者蓋後世人但見孔子時老子猶在故為此言不知老子化胡之後復還中夏幽隱孔子乃得師之也喜至關曰夫陽數極九星宿值金歲月並王法應九十日外有大聖人經過京邑時周都鎬京在函關之西乃先敕關令吏孫景曰若有形容殊俗車服異常者勿聽過喜即預期齋戒使掃路四十里夾道燒香以俟天人入境至七月十二日甲子果有一老人皓首聃耳乘白輿駕靑牛而至關吏曰明府有教願翁少留乃入白喜曰道今來矣我得見聖人矣即具朝服出迎跪伏叩頭邀之曰願大人暫留神駕老君謝曰吾貧賤老翁居在關東田在關西今暫往取薪何故見留幸聽度此一試也喜復稽首曰大人豈復取薪久承大聖當來西遊勞神暴露願少憩聖駕老君曰吾聞大秦有古先生其道無為欲往觀焉是以升車就道經歷子關子何苦留也此二試也喜又曰今睹天人聖姿超絶乃天上之至尊邊夷何足往觀乎願不託言少垂哀憫老子曰子何所見而知吾此三試也喜曰去冬十月天理四星西行過昴自今月朔融風三至東方真氣狀如龍蛇而西度此兆大聖人之徵喜少好墳易及天文祕緯凡仰觀俯察未嘗不驗故知必有聖人度關夙夜存思未嘗暫息今似有緣果遇仙駕願垂慈憫開濟沉冥老君既三試之皆過乃恬然含笑曰善哉子之知吾吾亦已知子有通神之見當得度世也四皓角里先生論曰觀老氏與喜生豈不警悟先機耶而猶如此執謙辭者欲教世耳喜於是就官舍設座供養進盥櫛行弟子之禮老君之御者徐甲少賃於老君約日顧百錢至出關時計當七百三十萬錢甲見老君去官遠適亟來索錢老君謂曰吾欲往西海大秦罽賔天竺安息今汝御車當以黃金計直償汝甲如約及至關令飰靑牛于野老君欲試之乃以吉祥草化為一美女行至牧牛之所輒以言戲甲甲惑之欲留遂廢前約乃詣關令訟老君索傭錢老君謂甲曰汝隨我二百餘年汝久應死吾官卑家貧無所役使故以太玄生符與汝汝所得至今日汝奚不念此而訟吾言訖符自甲口中飛出丹篆如新甲即成一聚白骨喜憫甲違約致死乃為甲叩頭請命願赦其罪賜以更生乞為出錢償之老君重喜慈捨曰善乃復以大玄生符投之甲即立生老君曰吾不負汝汝負本約道自去汝故死耳今償汝錢喜即以錢給甲而禮遣之甲請留不許伏地搏頰曰已沐聖恩曲赦罪戾令此枯骨復見光明刻骨銘心願從雲駕老君竟弗許老君為喜留關下有一百餘日喜齋戒叩頭再拜跪請曰塵凡孺子幸遇聖人投身委命願聞大道老君曰微哉子之問也大道守真三品為則以一為度以正為德喜曰道品有三要得升仙其可得乎老君曰子能知一萬事畢閉塞情欲入奧室鍊金食氣為第一子能知之守勿失喜踴躍稽首曰鍊金奈何曰神方也自至真上帝莫不由金丹而得道履九幽而入杳冥上下虛無因神明而俱升喜復稽首曰願聞其旨老君曰紅鉛黑汞大丹頭從紅入黑是真修黑中取精赤取髓解取赤黑藥無比用赤入黑保長生用黑入赤天仙矣喜曰道則高矣妙矣未覺未究願賜指示老君曰一者是鉛鉛為君二者是汞汞為臣若鉛不真其汞難親若鉛是親不失家臣青腰使者赤黑將軍和合兩姓異族同羣白汞作胸黃芽為根化鉛為粉鍊汞成塵陰居陽位陽數陰均月盈日昃寒暑區分開設法像赫然有文唯吾此道天地長存喜拜曰藥物之旨敬聞命矣爐鼎之制水火之候奈何老君歌曰圓三五寸一分口四八兩十唇長二尺厚薄均腹三臍坐垂溫陰在上陽下奔首尾武中間文始七十終三旬內二百善調均陰火白黃芽銀來去遊不出門漸成大性精純即歸一還本元至一周甚殷勤密防謢莫迷昏途路遠甚幽玄若達此會乾坤子午沾淨魄魂得長壽入仙村樂道者尋其文諦思之勿須論又歌曰日月本是乾坤精卦象周還甚著明前三五兮後三五五六三十復還生復還生兮周十二十二中分二十四二十四氣互推遷萬象友銖都在此水銀一味番為二變化陰陽成既未既未却配於夫妻始覺壺中有天地又歌曰金液還丹仙花流高飛雲翔登天丘赤黃之物成須臾當時雌雄紛亂珠可以騰變到行厨靈童玉女我與俱出入無間天地符其精凝霜無沉浮汝其震敬必來遊金液之訣皆盡於此矣丹成作金以為食器亦得長生先試作金成乃可服故曰金可作世可度也於是授喜太清八符經太清觀天經九都經神丹經金液經及八鍊九詩還丹伏次訣焉老君復謂曰審欲求仙先當服金液還丹汝不服丹盧自苦耳為溫寒風濕鬼氣聽繁司命不能救也可不勉哉努力作丹早自防禦勿示愚人令訕毁神道益子之過嗟乎行尸雖富有萬物貴於王侯不滿百年成土一匱甚可哀也合作神丹勞苦須臾一成便仙與天相畢恣心所欲樂何央乎喜曰鍊金食氣道有二乎老君曰天地之精華陰陽之根本二氣之謂也陽龍陰虎本液金精二氣交會鍊而成者謂之外丹舍和鍊藏吐故納新上入泥丸下注丹田循環不息朝于絳宫採於五石以哺百神此內丹也修道之士得內丹可以延年得外丹可以升天三一九思者內修之要也九丹金液者外鍊之極也合而修之道成決矣食氣固精受明玄經生道要妙出幽入冥上固雲門下固靈根知之甚易行之甚難夫形動德散氣越道叛精消魂損自動魄亂是以聖人靜形固氣畜精救視則道德虛凝魂魄固守形一神萬道乃成就常以半夜之後偃卧握固鼻納清氣口徐吐之復守三一入室九思神定氣安仙道近矣因授喜玉曆中經三十五章畢喜曰三一之旨願賜指示老君曰三一之道神仙所重世莫得聞子其祕之兩眉間却入一寸為明堂二寸為洞房三寸為泥丸上丹田宫也中有赤子字元先名帝卿心中為絳宫中丹田也中有真人字子丹名光堅臍却入三寸為命門下丹田宫也中有嬰兒字元陽名玄谷皆長三寸同服赤幘赤衣赤履此三一也一云上紫中赤下黃皆嬰兒狀下一座金床玉几常以金爐玉匕攪華池以哺上一中一當書夜常存之子欲長生三一當明子能守一一亦守子氣變為精精變為神神化為嬰兒嬰兒上為真人真人然後為赤子此真一也又曰偽道養形真道養神神真道通能亡能存神能飛形亦能移山形為灰土其何識焉耳目聲色為子留愆鼻口所喜香味是寃身為惱本痛癢寒溫意為形纍愁毒憂煩弗疾去之則志氣日耗壽命不終其來久矣子當先損諸欲莫令意逸間居靜處精思齋室丹書萬人不如守一常以虛為身以無為心無身之身無心之心可謂守神神神玄通是謂道同其猶高山大澤非欲蟲魚鳥獸而蟲魚鳥獸自歸之人能虛無為無非欲為道道自歸之矣余見西升經乃授喜自然經黃庭經及入室存思之要喜稽首再拜敬佩玄旨論曰聖言至簡玄理不繁如上所述乃問今纍日懇請老君隨機酬答之言纂集其要以示來世非一朝一夕談也喜於是辭疾去官十二月一十五日奉邀老君歸其家今樓觀即其故宅也望雲氣草樓及老君所乘車歷代寶之至今猶存焉老君將欲西適卜叩頭請侍行老君語喜曰吾遊乎天地之表戲乎玄冥之間四維八極上下無邊于欲隨吾不可得也喜曰入火入淵入地上天灰身復命願隨大聖老君曰得道之士目能淵視耳能洞聽變化不測坐在立甚尚未可隨吾遠適子雖骨相合道法當成真然受學日淺未能通神變化豈可隨吾耶喜再拜曰通神變化可得聞乎老君曰有生之氣有形之狀盡幻也造化之所始陰陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造化者其巧妙其功深故難窮難終因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可與語變化之道子能精修此道體入自然斯可與子行化諸國耳越二十有八日喜復焚香再拜請曰喜幸聞至道欣慶難言願賜著書闡揚道旨以貽後世老君曰善汝應為衆真之長當於此宛利天下棄賢世界傳弘大道即以道德五千言授之曰吾此文未嘗輕以授人凡經千二百載方一傳爾子其勉之喜拜授欣躍持誦奉行道成已遂傳後學唐陸希聲道德經傳敘云大道隱世教衰天下方大亂當是時天必生聖人聖人憂斯民之不底于治而扶衰救亂之術作周之末世其幾矣於是仲尼闡三代之文以扶其衰老氏據三皇之質以救其亂其揆一也蓋仲尼之術興於文文以治情老氏之術本於之質質以復性性情之極聖人所不能異文質之變萬世所不能易也易曰顯諸仁以文為教之謂也文之為教其事彰故坦然明白則雅言者詳矣易曰藏諸用以質為教之謂也質之為教其理微故深不可識則妄作者衆矣夫惟老氏之術道以為體名以為用無為無不為而格于皇極者也楊朱宗老氏之體失於不及以至於貴身賤物莊問述老氏之用失於大過故務欲絶聖棄智申韓失老氏之名而弊於苛繳刻急王何失老氏之道而流于虛無放誕此六子者皆老氏之罪人也而世固謂老氏之旨其歸不合於仲尼故訾其名則曰捶提仁義絶滅禮學病其道德則曰獨任清虛不可以為治於戲世之迷其來遠矣是使老氏受誣於千載道德不行於當時良有以也且老氏本原天地之始歷陳古今之變先明道德次説仁義下陳禮學之失刑政之煩言其馴致而然耳其秉要執本在乎情性之極故其道始於身心刑於家國終於天下如此其備也而惑者尚多豈不謂厚誣哉昔伏羲氏畫八卦象萬物窮性命之理順道德之和老氏先天地本陰陽推性命之極原道德之奧此與伏羲同其原也文王觀大易九六之動貴剛尚變而要之以中老氏察大易七八之正致柔守靜而統之以大此以與文王通其宗也孔子祖述堯舜憲章文武道斯民以仁義之教老氏擬議伏羲彌綸黃帝冒天下以道德之化此與天子合其權也此三子者聖人之極也老氏皆變而通之反而合之研至變之機探至精之歸斯可謂至神者矣而王弼以為聖人與道合體老氏未能體道故阮籍謂之上賢亞聖天人蓋同以輔嗣豈以老氏經世之術未足克其所言耶斯不然也於乎聖人之在世也有有迹有無迹故道不行也或危身歷聘以天下為其憂或藏名肥遁示世故不能纍有迹無迹殊途同歸斯實道義之門非徒相反而已然則仲尼之所以出老氏之所以處老氏之所以默仲尼之所以語蓋屈伸隱顯之極也二子安能識之哉司馬遷統序衆家以道德為首可謂知本末矣班固作古今人表乃詘老子於第三品雖其名可詘而道可貶乎哉且仲尼親見老氏嘆其道曰猶龍乎從之問禮誠無間然著在記傳後世不能探其意是以異端之説紛然蓋迷之者不窮其源故作之者不盡其致噫斯傳之不作則老氏之旨或幾乎息矣今故極其致顯其微使昭昭然與羣聖人意相合有能體其道用其名執古以御今致理如反掌耳自昔言老氏術者獨太史公近之為治少得其道唯漢文耳其他反傳詭説皆不足取尹文操論曰班固謂清虛之道養性延年不及於物殊不知清虛者法制之本無為者萬事之根道覆天下而不為主德施萬物而不為厚乃聖賢所貴家國所願豈止養性延年而已哉故曰修其身其德乃真修其鄉其德乃長以耿修之天下其德乃普則此萬古不刊之道也他日喜謂曰憃愚不知所問願請益老子曰子欲修身養性行道紀形結氣成神終始無窮者莫先乎靜故天靜以為正地靜以為定神靜以為變人靜以為生將正之時反聽內觀心不妄念口不妄言形不妄動無色之色為之見無聲之聲為之聞無味之味為之甘不言之言為之教神景為之降福德為之臻和氣為之應矣子欲靜神先沐浴齋戒或二十五日然後精練己身魂魄和平乃可入室之後或丹蛇來著子心或王母來降或道身應見此皆身中之神試子耳但勿驚怖有問無對有所傷犯亦勿為懼但安心定意其物自去經二十五日四十五日六十日八十日一百五日一百二十五日一百五十日並有神來皆是試子但定心勿對不能為害若生怖懼為試不過則失道矣戒之謹之百八十日後室內自明安危存亡之事無不預知身中宫府一一顯見二百八十日衆病皆除一年瘢痕皆滅千日之後形神俱妙為真人矣即授喜妙洞內解等訣太清上法三洞真文靈寶符圖太玄等法俾教授至精仁者羽化神仙令毋斷絶喜再拜稽首禮謝叩頭而退老君次年甲寅歲四月二十八日將於喜宅南山阜上升天喜悲戀請留老子未適西而復天者姑俟尹喜道成同去化胡也老君重告喜曰吾將俟子於蜀汝能除垢止念守一千日清齋修習吾經合服神丹鍊形入妙則可尋吾青羊之肆矣言訖忽聳身空中坐雲華之上面放五色身現金光洞徹十方神王力士靑龍白虎麒麟獅子列於左右前後九天高仙五帝直符正一使者持節來迎冉冉升天太微勾陳星宫即天皇大帝耀魄寶是良久乃沒喜目斷雲霄涕泣追慕其日江河泛漲山川震動有五色光入貫太微遍及十方論曰關尹宅倚山阜上先立臺館以瞻星候氣老子於中升虛後人遂呼為老子陵尓雅云大阜曰陵非謂墳陵也又訛而為冢良可嘆也喜乃於樓觀千日清齋屏絶人事研味真經餌丹服氣精思三年心凝形釋無有飢渴不畏寒暑窮數達變之微形一神萬之旨悉臻其妙老君以甲寅歲升天至乙卯年復乘九色神光從太微宫分身降生於蜀太官李氏之家已先勑靑童化為青羊毛體華潔色如靑金常在嬰兒之側愛玩無斁忽一日失羊所在兒啼不止太官乃令守羊童子處處尋覓得於市肆喜至蜀遍問諸人無識靑羊肆者忽見童子牽羊因自解云既有靑羊復在市肆聖師所約其在是耶因問此童誰家羊牽欲何往童子答曰我家夫人生一兒愛玩此羊失來兩日兒啼不止今却尋得將欲還家喜即囑曰煩為我告夫人之子云尹喜至矣童子如其言入白兒即振衣而起曰令喜來前喜既入其家庭宇自然寬平湧出千葉蓮花之座老君忽化數丈白金之身光明如日項有圓光建七耀之冠衣晨精之服披九色離羅之帔坐于蓮花之上舉家見之皆驚怪老君曰吾太微是宅真一為身大和降精耀魄為人主客相因何乃怪耶尹喜匍匐歔欷悲啼踴躍喜慰無量稽首言曰不謂慶會復奉天顔未審慈尊出無入有起處安否老君從容告曰與子别後何得何喪汝存道守一亦有益乎喜稽首曰自奉祕奧粗得其妙恩濟祖先感受無極之慶老君曰喜吾所以留子者以子居世未久深染恩愛初授經訣未克成功是以待子於此今子保形鍊氣三年功畢已造其妙心結紫絡面有圓光金名表於玄圖王札係於紫房氣參太微解形合真矣喜再拜稽首謝曰聖師德重天地恩過父母天地能覆載喜不能令喜得道父母能生育喜不能令喜長存老君曰此亦汝之玄分非吾功也於是舉手彈指即有四天王三界衆仙浮空而至各執香花稽首聽命老君勑五老上帝四極監真授喜文始先生號受任無上真人賜紫芙蓉冠靑羽裙丹襡緑袖霓裳交帶羅文黃綬九色之節及玉童玉女五千人位居四天之上統領八方仙士喜降拜俯伏曰塵凡孺子得遇大聖使枯骨再肉千生慶幸俾居則執掃除之役行則為僕御之徒喜之願也亦喜之榮也位號高崇禮文優渥顧何得以祇承敢辭老君曰子慕道積久隱德升聞修鍊勤勞玄功已遂分合得此非吾有私於子也子其勉之喜辭不獲乃再拜而授自此方得乘雲駕龍飛騰虛空參侍龍駕遊行八方老子復為太官聖母説元陽經其家長幼二百餘口即時拔宅飛升天老子以太官家世積功德升聞上天緣合升舉故托生其家今成都有靑羊宫及降生臺元陽臺之址存焉唐翰林學士承旨知制誥樂朋龜奉勑撰宫記其略曰道渺邈以難窮體希夷而莫究在無象無形之內居太初太易之前二神屭屓以俱來鑿開造化三氣氤氲而互進朴散胚腪玄黃流而未凝清濁分而不結道為萬氣之祖德為百物之宗以二儀兩曜為子孫以四象五行為枝葉又云移世界以納壺中吞維摩方丈之室縮地形而藏術內奄息達王舍之城桃源蓬島從古有而今存槐市杏壇見朝榮而暮落身駕德車轊轉於混茫之內手持壽柄指揮於開闢之前寂爾無為淡然自得化其不化則萬化而皆存生其不生則羣生而盡遂幽原既開九氣陶蒸而未已玄化大闡六虛流轉而勿休設不二之教門稽正一之宗本前逍遙於靑運靑運既到後出沒於赤明赤明復畢九十九萬億歲貯在彈丸五千五百重天藏於卵殼殷高宗御極之際周文王演易之初神光流入於瓊胎瑞彩結成於金骨七色金蓮而隨步千年白鹿以呈祥七百弟子指扶桑於故林九五帝君開日宫於舊館詳其元始稽彼厥初俯窺溟涬之前下視渾淪之後隨機設教作萬古之楷模應變無方為百王之軌範故大道者三界之冠冕上德者百王之宗元青羊肆者我聖祖太上玄元天皇大帝第二降生之所也自殷道否閉周德陵夷歷藏室之同塵棄柱史而隱迹東離魏闕西度函關徐甲執御從先帝以聿來尹喜占風知道君之必至暫别而三千甲子曾作赤童相逢於八百年齡永依黃老潛傳妙訣暗付微言重為百日之期再結一時之會暫朝元始却上天中之天永奉宗師重歸象外之象又云將離蜀士欲化胡風遠適流沙長移獷俗及身毒罽賔之國教煩陀阿柱之王八十種之獯戎皆歸清化二千國之獷悍永革昏風銘曰洪源肇開浩劫無際恍惚大道希夷象帝太初既隱太始來繼玄黃在殼清濁未蛻天地之前億千萬歲設教隨機應變無滯三皇益名五帝增睿率土皆泰羣生咸濟樓觀發軔函關挂轊罽賔闡化身毒布惠無狀之狀無聲之聲去莫可送來莫可迎強字之字強名之名煥赫六極牢籠八紘萬國同約百谷咸傾莫得而竭莫得而盈淺而行者長居利貞深而行者永致太平又曰鑿開造化刳剔胚腪把捉日月包裹乾坤萬象俱盡惟道獨存三教爭長唯道高尊唐中和四年九月勑西川節度使立碑靑羊宫今見存老君謂尹喜曰子昔願從吾遠遊今道已成可以遊觀八紘之外也乃吐八方隱文授之喜奉受訖即致八景雲輿駕五色神龍建流霄皇天丹節廕九光鶴蓋前導十二衛官神丁執麾後有九萬飛仙驂控飆轊獅子啓塗鳳凰翼軒策空東遊真人與四天王從焉天樂並作悲笳駭空至日窟常暘之山掇扶桑之丹椹散若木之朱華觀碧海挹東井過鬱池宫暘谷神王東海青童衆仙陳丹椹朱實金津碧醴次登祖山觀芝田採養神草息蓬萊宫復南遊鳳山登靑丘過紫府太元真人紫府先生奉九光甘液白文玉英青林白子此山一名蕭丘出九光之英火浣之布次登長離山越赤精津入大丹宫南極夫人諸仙侍女設瓊花玉酒赤靈火棗至絳山觀流火之鄉息朱陵之闕大和玉真華蓋上翁列炎岡朱髓飛丹紫桃雲浪之液而奉焉乃西遊龜臺入七寶園觀飛紫文過流精闕九靈金母太素元君進玉文之棗其實如瓶命侍女陳返魂靈香玄光碧桃金紫交梨遊騫林七靈丈人諸仙設雲漿玉英震金玄膏泛弱水登鳳山入龍穴挹玉池息昆吾山白帝天君五通諸仙採七明石芝流精玉膏紫樂朱英金光丹醴進焉後北遊崆洞山過洞陰宫北極真公四華諸仙獻十結神草玄雲李空洞瓜其瓜劫一熟登玄丘觀朔陰八練池息廣寒墟太玄仙伯設絳樹丹寶三玄紫奈至鍾山過集雲宫北極太極真人五通真仙奉玄玉芝夜光洞草雲膏玉液進焉復登中嶽崑崙山遊玄圃瑶臺入閬風非人間非西蜀之崑崙之五嶽乃三山海島神仙觀七寶瓊林聆九苞鳴鳳盻日月星辰下照照見四天下如指掌其上有金臺玉樓七寶宫殿晝夜光明天地神仙之下遊處也一面有二百四十門有瓊林紫奈萬歲靈桃碧葉隆音如琴瑟相和皆應律呂太玄九宫仙人居焉皆自然天厨出入在意天伎雅絶樂難可勝實宇內之清都神真之盛觀也尹真人初授童真之任隨侍老君遊此宛利天下五嶽名山洞天宫館及四海江河洞泉水府諸宫上真下治之所其經行處皆預有仙官出境侍衛送迎老君所到皆入室堂大殿當陽正坐其主者或稱聖帝或號真王或君或侯或公或相皆俯伏稽首側耳聽命神仙玉女地下主司山水百靈莫不雨集衆真聖帝有所咨啓多論二儀三景陰陽氣候劫運賒促帝三命録長短安危興廢兆人禍福并學道進仙階級黜陟之事調和氣序抑消陽九百六災會之法或請問道德宗原希夷之旨老君如所咨請事事酬答各隨諸天之音言辭隱奧世莫可傳不可測識為王母説請淨經亦此時老君謂喜曰吾將與汝上朝太上遊歷帝鄉於是靈音八會雲騎四合冉冉升空遂遍遊九天諸天帝皆乘輿建節從官及玉童玉女各數萬計來迎老子入其宫宇設瓊英王實月液雲漿碧醴流薰蘭羞八徹靈芝仙果光華映席天樂繁會靈唱妙絶諸天帝仙真皆頂有圓光各禮拜請問自然無上玄妙至真帝一之道已而上元大有真公中元太極仙翁下元太清仙伯仙卿仙官乘碧霞黃素雲輿駕蒼虬麒麟獅子張映交暉流霞鸞鳳飛鶴之蓋仗日精命真之旆命仙之旗侍從神仙靈官共十有五萬上元七萬中元五萬下元三萬所乘駕及蓋旆之節之類亦諸天諸仙稽首拜迎老君上升上清日闕丹城蘂珠宫老君乃命喜朝高聖玉宸太上大道君於是賜喜環剛丹果隱伏龍芝珠瑛玉醴共一十二事乃從老君下降于天水靈山遂之西域太上混元老子史略卷下
