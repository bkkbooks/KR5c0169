body:
  text: 廬山清虛菴道士臣謝守灝編太上老君乃元氣之祖萬道之宗乾坤之根本天地之精源混沌太無之中凝自然之真而為體廣大無邊應化莫測非陰非陽能微能彰不古不今不存不亡常於無量劫運之端太初太易之前肇布玄元始而生太極判太極於三才至劫終於六合俱消混沌為一又復分判凝輕清以為天積重濁以為地陽精為日陰精為月日月之精為星辰運行四時八節安鎮名山大川二氣交會則動植萬彙更相産化初自一氣而生三氣合生九氣是為九天注自然之氣生鬱單天禪善天須延天即清徽之氣生也禹餘天之氣生兜術天不驕樂天洞元天太赤之氣生梵輔天清明天無想天此玄元始三氣各下生三天合為九天各下三天合為三十六天其外有諸梵天悉係屬於九天主也次生四種民天亦曰種天謂開劫之初降為人種也釋氏呼為四禪天此天上取太清境三千三百萬億氣下生八梵天五千五百五十五萬氣凡一氣三千里也此天出三界之上超陰陽之數故無年壽之限水火風三災不能壞也次分三界欲界色界無色界天次布八梵天始青天青元天始丹天大丹天始素天大素天始玄天大玄天也次人間世北方清靜世界東北長安世界東方納善世界東南用賢世界南方棄賢世界西南仁靜世界西方淨行世界西北延賢世界下置九地第一壘色潤地第二壘剛色地第三脂色地第四潤澤地第五金粟地第六金剛澤地第七水制地第八風澤地第九壘洞淵無色綱維地每壘出一重上一重水一重風自上而下大劫之永九地之上至無色界三災大作萬像消化種民之上災所不及元氣復合劫為混沌劫曆重開於是復命此天之人降為人種下世行化為君為臣制立法度更相訓導亦如此劫之初凡經無量浩浩之劫悉皆如是矣天地之外象類雞卵元氣繞之如日之暈其詳見於三界混元圖及開天經渾天儀等書如是天地各有五億五萬五千五百五十億重也亦各於其中立天文地理運陰陽五行列神祇産萬彙秉生成之柄鎮造化之源故在天為衆聖之尊在世為萬教之主先塵運劫而行化後無輕極而常存道運御世開闢玄通故號無上三天玄元始三氣太上老君焉老子者為之應形也應既不一號亦無量或號三十六號或號七十二名或號九天上皇或號洞真帝一君或號高上玉帝或號太平正真太一妙氣皇君或號九玄帝君或號大千法王或號九靈老子或號九玄帝君或號上左玄真人或號上清金闕妙經大法師或號高上大法王或號玄一真定光或號金闕後聖君或號太平上景君或號無為父或號萬物母其降生之時十方天神空中稱讚尊號有十曰太上老君高上老子天皇大帝玄中大法師有古大先生金闕帝君太上高皇虛無大真人復有至真無極大道自然元始太上天尊道君無上天真元老天師黃老世師玄宗神人真人仙人至人大人道聖人之號以上號名二字降生在世名字凡有九名耳字伯陽名雅字伯宗名志字伯光名石字孟公名重字子父名定字元陽名元字伯始名顯字元生名德字伯文或曰伯陽父老尊老之稱也老君嘗以上和元年歲在庚寅九月五日甲子卯時降生鬱單北玄因天剛靈鏡山李谷之間上玄靈母九玄之房乃以谷為民旌名弘九一名玄水嘗曰吾姓字渺渺從劫至劫非可悉紀也論曰上和乃天上之紀年如赤明朱陵清漢天漢開皇上皇之類是也而世俗之士祇知甲子造於大撓年號始於漢武便以上和等號皆謂之妄殊不知上天自億劫以前紀年不廢世人無從而知耳自鬼谷子北郭子漢天師葛仙翁等方引諸天之號以配人間時代也不然則諸仙博古該今窮幽究微豈不知秦漢之前未有年號耶且如開闢之初建立法度及世代因革皆上天素定時遣天真降教以傳人世耳非世人能先天而肇造化也學者詳之老君洞聖極真總司萬化故能變名易號降德屈尊化身下降遊行萬方扶世立教或為國君或為師友咨請問難互相發明出自然靈文演無為要旨經圖戒律應運施行出幽入虛無不經歷説化諸國調伏羣魔時亦上朝元始中謁玉晨賞校九宫主領神人真人仙人聖人下統三界一切神官鬼僚考察之司仙宫靈洞福食之曹無幽不顯莫不仰隸之焉或下理十天撫掌兆人則太微勾陳紫房中為天皇大帝即勾陳六星中有一星帝座是也或春化為上景君長九千丈建七精寶華之冠建即戴也衣玄黃二氣衣服青錦飛裙手執虎符坐七色之雲或夏為老翁戴飛龍之冠衣玄文之服黃羽之裙手執金枝立紫雲之上或秋化為童子衣五色之服或乘獅子或坐青雲或冬化於蒼玄青三色之光光明混沌更相纏繞此則通金闕之氣更受鍊玄通晨之精也惟神通自在故能白能黑能方能圓能屈能直能強能弱能輕能重能短能長能老能少能高能深縱橫反覆無不能焉或為千二百老子應現諸天或為百八十道君接引凡界分靈散景倏忽周遍而真一之身湛然常寂常在太清太極宫也老君在初三皇時號玄中大法師下教歷九千百億萬歲運當劫交更立元始是時龍漢延康劫終也延康之前載籍叵考赤明開圖然後經典始可得推也中三皇時赤明之年也號有古大先生授三皇內文下教歷九千九百億萬歲復令劫交後三皇時天皇地皇人皇之世乃闕皇之年攝提紀也定位配四海於四神付五行於五帝授五靈五老靈寶五篇真文下教歷萬八百歲至宓羲氏大朴漸散法度未立乃降於田野號鬱華子授天皇內文又降神龜河圖八卦之文在祝融時降于恆山號廣壽子授人皇內文教以安神之道俾陶鑄為器以變生冷在神農時降于濟陰號大成子授地皇內文教以好生之道俾種植穀果以代烹殺和合方藥救疾養性禮記諡號記並無祝融而後神農注則先神農而後祝融為炎帝之祖以火德王不必移於神農今當以記為正其後重移為火正亦號祝融在黃帝時降于崆洞山號廣成子帝即位二十九年憂天下之不治往見廣成子而問曰聞子達於至道吾欲取天地之精以佐五穀以養民人又欲觀陰陽以遂羣生為之奈何廣成子曰而所問者物之質也所欲觀者物之殘也自汝治天下雲氣不待族而雨草木不待黃而落日月之光以荒矣而佞人之剪剪者又奚足以語至道黃帝退捐天下築特室席白茅順下風膝行而進再拜稽首問曰聞吾子達於至道敢問治身奈何而可以長久廣成子蹙然而起曰善哉問乎來余將語汝夫至道之精杳杳冥冥至道之極昏昏默默無視無聽抱神以靜形將自正必靜必清毋勞汝形毋搖汝精少思寡欲可以長生目無所見耳無所聞心無所知汝神將守形子乃長生愼汝內間汝外多知為敗我為汝遂於大明之上矣彼至陽之原也為汝入於沓冥之門矣彼至陰之原也天地有觀陰陽有藏愼守汝身物將自壯我守其一以處其和故修身千二百歲吾形未嘗衰也黃帝再拜稽首曰吾子之謂天矣廣成子謂帝曰來余語汝彼其物無窮而人皆以為終彼其物不測而人皆以為極得吾道者上為皇而下為王失吾道者上見光而下為土今夫百昌皆生於土而反於土故余將去汝入無窮之門以遊無極之野吾與日月參光吾參天地為常乃授帝陰陽經老君於後三皇時説經世謂之三墳之書久失其全篇兼纍世所説經多藏瓊臺琅函或祕藏龍宫海藏神真保謢世莫得聞今收傳者太山一毫芒爾又命西王母授帝元始天尊玉像帝置於高觀古人謂高臺為觀可觀瞻四方道觀之號自此始老君命帝陟王屋山開石函發玉笈得九鼎神丹飛雪爐火之道遂鑄鼎荆山鍊丹成服之有雲龍來迎帝乘龍上升時羣臣侍女同得升天者七十有二人其餘不及上爭侍龍髯攀墜黃帝之弓與鼎皆抱之號泣世謂之烏號之弓民無所追慕遂取其遺物於巴山以曆墳之號巴陵又造陵於橋山以曆其衣冠鼎所墮處謂之鼎湖焉按玉緯經云有稱三皇亦稱九皇洞神大有經云三皇治各三千六百年又小有經云三皇治各至萬有八百歲詳此二説大有經止論一代三皇每一三皇治三千六百年小有經乃説論三代三皇每一三皇治萬八百歲也若通論三代九皇則共至三萬二千四百年矣或萬八千者蓋百字誤為千耳今據老子內傳所明正與大有小有相符又前三皇中三皇各至九千九百億萬歲者乃計一劫之大數非止言三皇之身也後之言三皇者亦多不同也如洞神經玉緯經與項峻止以天皇地皇人皇為三皇而皇甫謐注春秋運斗樞鄭玄高誘注吕覽以庖犧女媧神農為三皇禮記號諡記以為宓羲祝融神農白虎通以為庖犧神農燧人聊氏以為巢燧人伊耆帝系譜中經出塞記瀨鄉記以為伏犧神農祝融也在少皥時號曰隨應子説莊敬經教以順時行令在顓頊而降於衡山號赤精子説微言經教以大順之道在帝嚳時號録圖子授黃庭經教以清和之道在帝舜之時降于河陽號尹壽子授道德經教以無為之道在夏禹時降于商山號真行子教以勤儉之道授九疇靈書靈寶五符治水真文及罡步檄召鬼神之法今本山洞天遺迹存焉在商湯時降于潛山號錫則子説長生經今天祚宫前龍堂之址即其所也教以恭愛之道抱朴子作神仙傳以世教第一然復疑其歷為帝師謂皆見於碎書不出仙傳正經又為不應舍尊適卑背澄清而入臭濁棄天官而受人爵且曰有天地則有道術之士世世有之何必常是一老子耶皆晚學之徒淺見之士好奇尚異耳唐昊天觀主尹文操論曰抱朴撰傳意在顯述老君記自修成將以訓誘後人令其勉力今據載歷古為帝王師傳者乃出太玄經正一經太清經玉歷經元氣經出塞記尹氏玄中記崔山地理志皆真經良史豈得悉謂之碎書抱朴又云若謂老子是得道之人則人必勉力若謂之神靈則非可得也此抱朴子私見耳殊不知開闢之始因學而得道者必先有自然之聖降為之師隨機傳授焉定志經云昔天尊造化行應自然暗與理合自然玄悟本氣文字撰集成經以將來則老君自然合道而世世為師亦何疑焉既為大慈無為之父亦何辭舍尊就卑和光臭濁乎老君謂尹喜曰上世始已來所更如沙塵動則有載劫自惟甚苦勤太玄經亦云老子積學轊轉位登上聖應接無方不可稱述近世出化生乎殷末是以文始鬼谷張真葛仙並云老君生乎太無之先經歷天地不可稱載此皆前世得道真仙依經演述豈亦晚學捷見之士歟抱朴須欲曲成私見不覺謗祖及真斯亦通人一蔽未可依憑者也老君雖歷代應見而未有誕生之迹將欲和同光塵以立世教乃先命玄妙玉女降為天水尹氏之女乃無上元君之化身唐朝追尊為先天元君名益壽適仙人李靈飛靈飛李臯陶之後至商時父子相承得修真之道父慶賔年百餘歲常有少容周遊五嶽諸山旦雲龍下迎白日升天靈飛感父升天之事徐隱不仕內修大道亦百餘歲老君未誕升天至商十有八世王陽甲踐祚十七年庚申歲老君自太清境分身化氣乘日精駕九龍化為五色流珠下入玄妙口中託孕時尹氏晝寢夢天開數丈衆仙捧日出良久見日漸漸小從天而墜為五色珠大如彈圓因捧吞之覺而有孕今有流星埪在亳州天靜宫容顔益少神氣安間所居之室四時和暢六氣和平冬無凝寒夏無酷暑祥光明室靈氣滿庭衆惡不侵萬靈潛衛八十一年不覺其久至商二十二王武丁九年庚辰二月十五曰卯時以建丑為正商之二月乃夏之正月也聖母因攀李樹忽從左腋降生是時陽景重輝祥雲廕庭萬鶴翔空四靈翊衛玉女跪捧九龍吐水以浴聖姿龍出之地因成九井今在亳州太清宫每汲一井九井皆動降生之後登行九步步生蓮花指李樹為吾姓論曰老君常於歷劫之前降生於北玄玉國李谷之間以李為姓今又降於李氏之家李木之下生而知其姓故指以示人非今方姓李也舊記有云老君於生登行九步目顧四方左手指天右手指地曰天上地下惟吾獨尊愚切以為不然夫老君雖為三界之至尊本以謙慈柔弱設教決不肯虛驕恃氣以誇強自大況釋迦生於西域凶橫之外國于時雖有浮屠教法殺父害母視為常事設或有子初生遽出不遜之語胡王必曰是子才生早無君父壯將若之何時可忍而育之乎其殺而棄之必矣以此知其不應有是言也故今皆削去之其諡曰聃老君耳平頂厚面且堅下有垂珠中有三門天神之表與凡迥異故以為諡或作儋者字誤也或作耽者音訛也或謂其吐舌舑舑然而謂之聃此又傳聞之誤也居乎陳國苦縣瀨鄉曲仁里渦水之陽或云楚國者其地連楚熊繹之始封也或稱相人或言樵人者蓋亳北近桐城瀨水之東四十里有譙城故也鄉名賴音亦以水而得其名也陳則大皥之墟也宛丘之側禹貢樂豫水之分武王封舜後胡公滿於其地因曰陳國後漢章帝時改為陳郡今為亳州商湯之故都也苦縣唐封元年改為真源縣今為衛真縣是也降生九日身有九變一變身長六尺六寸冠魚鵲之冠衣黃紫八綵鳳衣獸文混沌自生第二變身長七尺七寸冠重疊冠衣素衣赤領袖第三變八尺八寸冠通天冠衣五綵衣第四變長九尺九寸冠辟邪冠衣羅袿衣第五變長一丈三寸冠龍蛇冠衣朱衣第六變長一丈五寸冠無極之冠衣朱玉之衣第七變長一丈七寸冠虛無之冠衣黑綵洞衣第八變長一丈一尺冠辟邪大冠衣龍蛇衣第九變長一丈二尺冠自然無氣須臾百變之冠衣自然羽衣皆天冠天衣自然被體仍有匕十二相八十一好七十二相者頂圓為天面光相日伏晨蟠起玉枕穹窿皓髮如鶴長七尺餘眉有北斗其色翠緑虎髭龍髯素如潔絲耳有垂珠中有三門高平如頂厚而且堅兩目日光方瞳緑筋鼻有雙柱準骨隆隆口方如海唇赤如丹氣有紫色其香如蘭齒如編貝其堅若銀數有六八上下均平舌長且廣形如錦文其音如玉其響如金顴高而起頤方若矩日角月淵金容玉姿龍顔肅肅鳳視間間額有兑象參午上達天庭平坦金匱充盈頰有白痣頤有玉丸項有三約鶴素昂昂垂臂過膝手握十文其指纖長各有策爪有云甲身有緑毛胸有偃骨背有河魁臍深寸余腹軟如綿心有錦紋腹有玄痣眼有轊文足蹈二卍指有乾坤身長丈二遍體芳香面方而澤上下三停身如金剛貌若琉璃行如虎步動若龍趍此其相也左扶青龍右據白虎前導朱雀後從玄武頭廕紫雲足履蓮花頂負兩景五明曜日身有圓象洞照九天兼前仙相光色奇妍總八十一謂之好也寄胎八十一年極太陽之數生而皓首故號老古人稱而為子又子者男子之通稱也故號老子一説老者長年之稱子者幼作之號欲謂之老又是初生欲謂子又乃白首故二義而稱之唐尹文操論曰老子者即道之身也迹有內外不同由能應之身或異也其內號者即至一真一玄一皇一元一帝一太一天一正一等是也至一者妙而無質也真一者淳粹湛然也玄一者通靈不滯也皇一者光明無上也元一者萬道之長也帝一者百神之聖尊也太上者長生之大主也天一者司陰之真宰也正一者盟威之法王也謂兹九義同出異名既玄極故咸言一矣其外號者則鬱華大成廣壽隨應赤精録圖務成尹壽真行錫則燮邑育成郭叔等子是也鬱華者道化光盛也大成者玄德普資也廣壽者怡神術瞻也廣成者攝生功博也隨應者感通無礙也赤精者矜靈丹著也録圖者符命冥合也務成者庶績克遂也尹壽者公正身康也真行者精神淳粹也錫則者仁惠有方也燮邑者風教變俗也育成者牧養克諧也經成者正訓常全也郭叔者廓清纍代也此並皆隨教得名既降為國師故國稱子矣聖母既誕育道身將返天闕復元君之位而欲示世人有師資傳授之道乃告老君曰夫人受生於天地中有清有濁氣之清者聰明慈仁氣之濁者愚癡凶虐明者因修以成其性昧者恣欲以傷命性者身之原也命者性之根也是故修行之人鍊身於九丹解結於五神引氣於本生滅根於三關九鍊十變百節開明胞結斷滅乃知本真而成上仙若不修學則邪魔入身百痾從此生夭逝因兹致死不盡命痛乎難言夫仙由心學心誠則仙成道貴內求內密則道來能致靜以合真積虛以通神則去仙日近矣苟心兢神勞體煩不專動靜喪精耳目曠明徒積稔索道道逾遠也寄寓天地間少許時耳若能攝氣勞神辛苦注真久將明道則與天地共寄寓大無中矣能洞虛體無則視之不見聽之不聞乃與道合真矣老子曰今混迹塵寰欲長存不死隨世度人可乎元君曰吾有祕寶非聖不傳有能修之可以長存老子曰願聞其致元君曰至道淵奧深不可識非有非無非聲非色視之不見搏之不得囊括天地至大無極近在諸有莫知能測能知其則是謂玄德老子曰其道亦有術以致之乎元君曰道者虛通之至真術者變化之玄技因術以濟人因修而會道則變化無窮矣夫道之要者無為而自然術之祕者符與氣藥而已符者三光之靈文天之真信也藥者五行之華英地之精液也氣者陰陽之和氣藥物之靈爽也人雖得一事未畢要資符藥道乃訖此吾之祕寶爾能兼之可以長存度人無量矣老子曰身者得道之器也氣者致命之根也根拔則命終器敗則道去今欲修之令命固道隆得可聞乎元君曰稟骨肉之質猶陶家坯也坯未冶則敗速身未鍊則命促理固然也縱使德冠羣有神疏大玄而身猶恐未免乎老死夫何故哉由化致然不得不然也惟藥能鍊形符能致神神歸則心通而性逸形固則氣固而命全然後化氣變精洞入無形飛行虛空存亡自然乃能長存得道之人雖遭劫交天地崩淪而災不能及所以貴乎符藥由此也老君曰服神丹而長生者神靈祐之乎將藥之力耶元君曰長生之功由於丹丹之成由於神故將合丹必正身心不履罪過神明佑之作丹必成成丹入口壽無已矣天地明察道歸仁人萬兆蠢蠢名曰行尸不信長生之可學謂為虛誕從朝至暮但求作死之事豈能長生之乎恣心盡欲奄忽輒死千金送葬何所益哉神丹道成不特長生而已可作世寶也知此道者亦安用天下為人有以國易吾方而非其人不傳也老子稽首曰願聞其旨元君乃仰天而嘯倏忽有紫雲而蓋自天奄至中有五色藴光明八達仙人涓子侍之元君復出神圖寶章變化之方還丹伏水火汞液金丹之術凡七十二篇以授老子或云其經今已不得其傳世所録者皆無師授偽誤相半仙經云盜道無師有翅不能飛也其文曰為玄白生金公太陽流珠入華池斤內五兩文萎蕤赤鹽白雪成雌雄五符九丹得之飛真道在此人不知五符者一曰玄白二曰金精三曰飛符四曰金華五曰三五靑龍精九丹者一曰白雪九轉還丹二曰雌雄九轉還丹三曰黃華九轉還丹四曰白華九轉還丹五曰丹華九轉還丹六曰五色九轉還丹七曰泥汞九轉還丹八曰金精九轉還丹九曰九鼎極耀還丹此九丹得一則可以長生不在遍作也神丹之道皆三化五轉至九而止服得之者與吾等矣夫草木之藥埋之則腐煮之則爛燒之則焦不能自生安能生人如金丹之物理之不腐煮之不爛燒之不焦治之愈妙故能令長生是知神仙之道不在祭祀祈禱鬼神不在導引與屈伸不在祝願多言語不在精思自苦勤長生之道要在神丹知之甚易為實難子能行之可長生此之道成立得仙吾亦學之非自然又曰上士服之升為仙官中士服之棲集崑崙下士服之在世長年汝但勤之吾不虛言老子再拜叩頭稽首曰九丹之道既奉慈訓矣切聞求仙不得金液虛自苦辛願示其要元君曰大哉之問也九丹金液同為升天之道然九丹中金液為上所以爾者服九丹之人或三年二年一年半年百日或六十日不可定限服之乃有仙官雲龍來迎惟服金丹者須有仙骨在身仙名在天金液入口則身色紫金立生羽翼升天為仙官矣凡欲服之須長齋斷谷一年乃得升天自非玄中之籙及不死之名者終不得聞九丹金液之道也其法依前合丹金成而液之其道畢矣此吾祕寶也凡千二百訣吾與往劫塵沙天地之先受之於元始天尊奏而行之得居無上元君之位吾昔已傳至真大聖天帝上帝太微太一元君今又授爾爾其勉之老君受記復請曰萬兆藝藝動之死地今以此道廣濟如何元君曰悠悠之徒耽榮嗜欲死者墮石投川往而不返甚可痛傷然道不虛行必受真人此道高妙祕於九玄瓊臺雲笈萬年一行貽諸玄籙玉名耳自非宿命骨相合仙之人不得聞也愚人多過烏得違天科而妄宣乎吾道盡此將去矣當遣太和元君語汝言訖即有千乘萬騎五帝上真擁八景玉輿來迎白日升天今太清神丹經其法乃出於無上元君其神能調和陰陽役使風雨進退五道斟酌寒暑驂駕九龍十二白虎天下衆仙皆迎隸焉人之生死咸由之猶言服丹之所也老君乃遠遊山澤求鍊神仙行經勞山果遇太乙元君乘五色斑麟侍官數十人老君從之問道元君曰道之要者在乎還丹金液耳遂具授祕訣他年之歷山復會太乙元君因謝神丹之方元君曰君是羣仙之尊萬道之主玄靈祕術本玄分也何謝之有應運期更百餘年可詣金闕受事老君曰凡民無知死者甚衆撫心泣血見之傷悲欲給以神藥令皆長生可乎元君曰不可生道至重必授大賢及孝順篤信之士天生萬物有善有惡善有宜生惡有當除不足給藥令皆生也君已知之不可輕泄老君以神仙之道必假修鍊欲垂法以勸來世故服佩符章合神丹今亳州太虛宫有鍊丹井存焉習真氣今宫有虛無殿乃服氣之所及修綱步等法然後乘空凌虛自然天丁神王侍衛嘯命主致徵召萬靈攝制魔鬼決斷生死身出水火變化萬端或分身混迹出有入無神通自在一日乘白鹿履庭檜之杪而升天今有升天鹿檜迹在亳州太清宫聖紀讚曰老君體寂大無德資妙有成道億劫造化萬天自然而然不由積學降九皇而設教委歷帝以為師獨立紫清誰與為先今乃親聖母而寄學從元君而訪道欲顯真道之玄非學不成神仙高奇修之可獲俾夫尊師貴德存牝守柔表上聖之靈規垂將來之妙範所以隨機示教奬善懲迷文始抱朴既述之於前今更讚之於其後太上混元老子史略卷中
